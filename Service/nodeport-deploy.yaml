apiVersion : apps/v1
kind: Deployment
metadata:
  name: robin-nodeport
spec:
  replicas: 3
  selector:
    matchLabels:
      app: robin-hood
  template:
    metadata:
      labels:
        app: robin-hood
    spec:
      containers:
        - name: robin-hood
          image: busybox
          command: ["sh", "-c", "while true; do date >> /var/log/index.html; sleep 10; done"]
          volumeMounts:
            - name: log-volume
              mountPath: /var/log
        - name: nginx
          image: nginx
          volumeMounts:
            - name: log-volume
              mountPath: /usr/share/nginx/html
      volumes:
        - name: log-volume
          emptyDir: {}
