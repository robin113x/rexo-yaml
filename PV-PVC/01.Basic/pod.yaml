apiVersion: v1
kind: Pod
metadata:
    name: pod-example
spec:
    containers:
        - name: pod-example
          image: nginx
          volumeMounts:
              - name: pvc-example
                mountPath: "/usr/share/www/html"
    volumes:
        - name: pvc-example
          persistentVolumeClaim:
              claimName: pvc-example
