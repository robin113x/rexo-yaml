apiVersion: v1
kind: ReplicationController
metadata:
  name: nginx-demo
  labels:
    app: nginx-rc
    version: v1
    type: dev
spec:
  replicas: 3
  selector:
    app: nginx-rc
    version: v1
    type: dev
  template:
    metadata:
      labels:
        app: nginx-rc
        version: v1
        type: dev
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "128Mi"
              cpu: "0.2"
