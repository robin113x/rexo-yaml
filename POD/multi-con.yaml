apiVersion: v1
kind: Pod
metadata:
    name: multi
    labels:
        app: multi-nginx
        env: dev
        version: v1.0.0
spec:
    containers:
        - name: alpine
          image: alpine:latest
          command: ["/bin/sh"]
          args: ["-c", "while true; do date >> /var/tmp/index.html; sleep 1; done"]
          volumeMounts:
              - name: shared-data
                mountPath: /var/tmp
        - name: nginx
          image: nginx:latest
          ports:
              - containerPort: 80
                name: http
                hostPort: 8060
                protocol: TCP
          volumeMounts:
              - name: shared-data
                mountPath: /usr/share/nginx/html
    volumes:
        - name: shared-data
          emptyDir: {}
