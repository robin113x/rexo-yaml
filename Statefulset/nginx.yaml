apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: nginx
spec:
    serviceName: "nginx"
    replicas: 3
    selector:
        matchLabels:
            app: nginx
    template:
        metadata:
            labels:
                app: nginx
        spec:
            containers:
                - name: nginx
                  image: nginx:latest
                  ports:
                      - containerPort: 80
                        name: http
                        protocol: TCP
                  volumeMounts:
                      - name: nginx-vol
                        mountPath: /usr/share/nginx/html
    volumeClaimTemplates:
        - metadata:
              name: nginx-vol
          spec:
              storageClassName: standard
              accessModes: ["ReadWriteOnce"]
              resources:
                  requests:
                      storage: 1Gi
