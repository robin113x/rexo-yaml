apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-var-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: env-var
  template:
    metadata:
      labels:
        app: env-var
    spec:
      containers:
        - name: env-var
          image: nginx
          command: ["-c","/bin/sh", " 'echo $pod_name $pod_namespace $pod_ip > /tmp/env-var.log"]
          env:
            - name: pod_name
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: pod_namespace
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: pod_ip
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP

            