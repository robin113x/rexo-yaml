apiVersion: v1
kind: Pod
metadata:
  name: downward-demo
  labels:
    app: demo
spec:
  containers:
    - name: busybox
      image: busybox
      command:
        - sh
        - -c
        - while true; do echo "Hello from busybox"; sleep 30; done

      # Environment Variables
      env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name

        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP

      # Mount Downward API Volume
      volumeMounts:
        - name: pod-info
          mountPath: /etc/podinfo

  volumes:
    - name: pod-info
      downwardAPI:
        items:
          - path: "name"
            fieldRef:
              fieldPath: metadata.name

          - path: "namespace"
            fieldRef:
              fieldPath: metadata.namespace
