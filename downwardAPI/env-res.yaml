apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-var-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: env-res-app
  template:
    metadata:
      labels:
        app: env-res-app
    spec:
      containers:
        - name: busybox-container
          image: busybox
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          env:
            - name: ENV_VAR_NAME
              value: "env-var-value"
