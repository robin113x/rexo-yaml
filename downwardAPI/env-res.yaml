apiVersion: apps/v1
kind: Deployment
metadata:
  name: env-var-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: env-res-app
  template:
    metadata:
      labels:
        app: env-res-app
    spec:
      containers:
        - name: busybox-container
          image: busybox
          command: ["sh", "-c", "while true; do echo 'Hello from busybox'; sleep 10; done"]
          resources:
            requests:
              memory: "128Mi"
              cpu: "200m"
            limits:
              memory: "257Mi"
              cpu: "500m"
          env:
            - name: cpu_limit
              valueFrom:
                resourceFieldRef:
                  resource: limits.cpu
            - name: memory_limit
              valueFrom:
                resourceFieldRef:
                  containerName: busybox-container
                  resource: limits.memory
            - name: cpu_request
              valueFrom:
                resourceFieldRef:
                  containerName: busybox-container
                  resource: requests.cpu
            - name: memory_request
              valueFrom:
                resourceFieldRef:
                  containerName: busybox-container
                  resource: requests.memory
            - name: pod_name
              valueFrom:
                resourceFieldRef:
                  containerName: busybox-container
                  resource: pod.name
