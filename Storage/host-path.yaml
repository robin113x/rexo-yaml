apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: busbox
          image: busybox:latest
          command: ["sh", "-c", "while true; do date >> /var/log/index.html; sleep 5; done"]
          volumeMounts:
            - name: html-volume
              mountPath: /var/log
        - name: nginx-server
          image: nginx:latest
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html-volume
          hostPath:
            path: /var/tmp
            type: DirectoryOrCreate
